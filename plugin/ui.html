<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<style>
  :root { font-family: Inter, -apple-system, system-ui, sans-serif; font-size: 12px; }
  body { margin: 0; padding: 12px; color: #1e1e1e; }
  h1 { font-size: 13px; margin: 0 0 8px; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #c0392b; flex: none; }
  .dot.on { background: #2ecc71; }
  #status { font-size: 11px; color: #555; }
  label { font-size: 11px; color: #555; display: block; margin: 6px 0 3px; }
  input[type=text], input[type=number], textarea {
    width: 100%; box-sizing: border-box; border: 1px solid #d9d9d9; border-radius: 6px;
    padding: 7px 8px; font: inherit; font-size: 11px;
  }
  textarea { height: 200px; resize: vertical; font-family: ui-monospace, Consolas, monospace; }
  .controls { display: flex; gap: 8px; }
  .controls > * { flex: 1; }
  button {
    margin-top: 10px; width: 100%; border: 0; border-radius: 8px; padding: 9px;
    background: #0d99ff; color: #fff; font: inherit; font-weight: 600; cursor: pointer;
  }
  button:disabled { background: #b9d9f2; cursor: default; }
  .hint { font-size: 10px; color: #888; margin-top: 8px; line-height: 1.4; }
  .card { border: 1px solid #e6e6e6; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #fafafa; }
  .copyrow { display: flex; gap: 6px; align-items: stretch; }
  .copyrow input { flex: 1; }
  .copy { margin: 0; width: auto; padding: 0 12px; flex: none; }
  details { margin-top: 10px; }
  summary { cursor: pointer; font-size: 11px; color: #555; }
  .ghost { background: #eee; color: #333; }
</style>
</head>
<body>
  <h1>HTML to Figma</h1>

  <label>Вставь HTML/CSS и нажми «Импортировать» — получишь редактируемые слои</label>
  <textarea id="html" placeholder="<div style='padding:24px;background:#0d99ff;color:#fff'>Привет, Figma!</div>"></textarea>
  <div class="row" style="margin-top:6px">
    <label style="margin:0 6px 0 0">Ширина, px</label>
    <input type="number" id="width" value="1440" min="100" style="width:90px" />
  </div>
  <button id="import">Импортировать в Figma</button>

  <details id="claudeBox">
    <summary>Опционально: получать HTML из Claude</summary>
    <div class="row" style="margin-top:8px"><span class="dot" id="dot"></span><span id="status">Подключаюсь…</span></div>
    <div class="card">
      <label>Вставь это как Connector в claude.ai (нужен свой аккаунт Claude)</label>
      <div class="copyrow">
        <input type="text" id="connurl" readonly value="…" />
        <button class="copy" id="copy">Копировать</button>
      </div>
      <div class="hint">
        claude.ai → Settings → Connectors → Add custom connector → вставь ссылку.
        Затем в чате: «импортируй этот HTML в Figma». Опция выключена по умолчанию.
      </div>
    </div>
    <label>WebSocket-адрес (для своего сервера / локального моста)</label>
    <input type="text" id="wsurl" value="" />
    <button id="newcode" class="ghost">Сгенерировать новый код пары</button>
  </details>

<script>
/* =============================== UI ↔ Figma =============================== */
let relayHost = "", roomCode = "";
const figmaCallbacks = {};
function renderViaFigma(tree, name, id, cb) {
  if (cb) figmaCallbacks[id] = cb;
  parent.postMessage({ pluginMessage: { type: "render", tree, name, id } }, "*");
}
window.onmessage = (e) => {
  const m = e.data.pluginMessage;
  if (!m) return;
  if (m.type === "config") {
    relayHost = m.relay; roomCode = m.code;
    document.getElementById("wsurl").value = "wss://" + m.relay + "/plugin?room=" + m.code;
    document.getElementById("connurl").value = "https://" + m.relay + "/" + m.code + "/mcp";
    // не подключаемся автоматически — только когда юзер раскрывает блок Claude (см. ниже)
  } else if (m.type === "render-done") {
    const cb = figmaCallbacks[m.id];
    if (cb) { cb({ ok: m.ok, error: m.error, nodeCount: m.nodeCount }); delete figmaCallbacks[m.id]; }
  }
};

/* =============================== WebSocket-мост =============================== */
let ws = null;
let wantConnection = false;
function setStatus(text, on) {
  document.getElementById("status").textContent = text;
  document.getElementById("dot").classList.toggle("on", !!on);
}
function connect() {
  const url = document.getElementById("wsurl").value.trim();
  if (!url) return;
  wantConnection = true;
  try { if (ws) { ws.onclose = null; ws.close(); } } catch (e) {}
  try { ws = new WebSocket(url); } catch (e) { setStatus("Неверный URL", false); return; }
  ws.onopen = () => { setStatus("Подключено", true); ws.send(JSON.stringify({ role: "plugin" })); };
  ws.onclose = () => { setStatus("Отключено", false); if (wantConnection) setTimeout(connect, 2500); };
  ws.onerror = () => setStatus("Ошибка соединения", false);
  ws.onmessage = async (ev) => {
    let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.type === "import-html") {
      const id = msg.id;
      try {
        const tree = await convert(msg.html, msg.width || 1440);
        renderViaFigma(tree, msg.name || "Claude Design", id, (res) => {
          ws.send(JSON.stringify({ type: "result", id, ...res }));
        });
      } catch (e) {
        ws.send(JSON.stringify({ type: "result", id, ok: false, error: String(e.message || e) }));
      }
    }
  };
}
document.getElementById("wsurl").addEventListener("change", connect);

// сеть к relay включается только когда юзер раскрывает блок «получать из Claude»
document.getElementById("claudeBox").addEventListener("toggle", (e) => {
  if (e.target.open) connect();
  else { wantConnection = false; try { if (ws) { ws.onclose = null; ws.close(); } } catch (err) {} }
});

document.getElementById("copy").addEventListener("click", async () => {
  const url = document.getElementById("connurl").value;
  const btn = document.getElementById("copy");
  try { await navigator.clipboard.writeText(url); }
  catch (e) { const i = document.getElementById("connurl"); i.select(); document.execCommand("copy"); }
  btn.textContent = "Готово ✓"; setTimeout(() => (btn.textContent = "Копировать"), 1500);
});

document.getElementById("newcode").addEventListener("click", () => {
  parent.postMessage({ pluginMessage: { type: "newcode" } }, "*");
});

/* =============================== Ручной импорт =============================== */
document.getElementById("import").addEventListener("click", async () => {
  const btn = document.getElementById("import");
  const html = document.getElementById("html").value;
  const width = parseInt(document.getElementById("width").value, 10) || 1440;
  if (!html.trim()) return;
  btn.disabled = true; btn.textContent = "Конвертирую…";
  try {
    const tree = await convert(html, width);
    renderViaFigma(tree, "Claude Design", "manual-" + Date.now(), () => {
      btn.disabled = false; btn.textContent = "Импортировать в Figma";
    });
  } catch (e) {
    setStatus("Ошибка: " + (e.message || e), false);
    btn.disabled = false; btn.textContent = "Импортировать в Figma";
  }
});

/* =============================== HTML → дерево узлов ===============================
   Рендерим HTML в изолированном iframe (srcdoc, sandbox без скриптов),
   читаем геометрию через getBoundingClientRect и стили через getComputedStyle —
   так же, как это делает html.to.design. Затем строим сериализуемое дерево. */

const SKIP = new Set(["SCRIPT", "STYLE", "LINK", "META", "HEAD", "NOSCRIPT", "BR", "TITLE"]);

async function convert(html, width) {
  let clean = html.replace(/<script[\s\S]*?<\/script>/gi, ""); // скрипты не исполняем
  clean = preprocess(clean);                                    // нормализуем формат Claude (x-dc)
  // Сначала пробуем изолированный iframe; если внутри песочницы Figma доступ к
  // его документу заблокирован (opaque origin) — рендерим в документе самого UI.
  try {
    return await convertViaIframe(clean, width);
  } catch (e) {
    return await convertInDocument(clean, width);
  }
}

/* ====================== препроцессинг формата Claude (x-dc) ======================
   Артефакты Claude используют кастомные теги <sc-if>/<sc-for>/<x-dc>/<helmet> и
   шаблоны {{ ... }}. Без рантайма все экраны рисуются разом, а скобки лезут текстом.
   Приводим к обычному HTML: оставляем один экран (по hint-флагу), разворачиваем
   списки, чистим {{ }} и снимаем scale()-обёртку макета. На обычный HTML — no-op. */
function preprocess(html) {
  let doc;
  try { doc = new DOMParser().parseFromString(html, "text/html"); }
  catch (e) { return html; }

  // 1) sc-if: удаляем экраны, не помеченные как видимые по умолчанию (hint != true)
  doc.querySelectorAll("sc-if").forEach((el) => {
    const hint = (el.getAttribute("hint-placeholder-val") || "").toLowerCase();
    if (!hint.includes("true")) el.remove();
  });
  // ...оставшиеся sc-if разворачиваем (заменяем на их содержимое)
  doc.querySelectorAll("sc-if").forEach(unwrap);

  // 2) sc-for: размножаем детей по hint-placeholder-count и разворачиваем
  doc.querySelectorAll("sc-for").forEach((el) => {
    const n = Math.max(1, parseInt(el.getAttribute("hint-placeholder-count") || "1", 10) || 1);
    const kids = [...el.children];
    const frag = doc.createDocumentFragment();
    for (let i = 0; i < n; i++) kids.forEach((k) => frag.appendChild(k.cloneNode(true)));
    el.replaceWith(frag);
  });

  // 3) убираем <link> внутри helmet (внешние стили/шрифты), разворачиваем кастом-обёртки
  doc.querySelectorAll("helmet link").forEach((l) => l.remove());
  ["helmet", "x-dc"].forEach((tag) => doc.querySelectorAll(tag).forEach(unwrap));

  // 4) снимаем scale()-обёртку макета (строкой по атрибуту — надёжно в любом движке),
  //    чтобы геометрия и размеры шрифта совпадали; translate(...) при этом сохраняем
  doc.querySelectorAll("[style]").forEach((el) => {
    const s = el.getAttribute("style");
    if (s && /scale\(/i.test(s)) {
      el.setAttribute(
        "style",
        s.replace(/scale\([^)]*\)/gi, "")
          .replace(/transform-origin\s*:[^;]*;?/gi, "")
          .replace(/transform\s*:\s*;/gi, "")
      );
    }
  });

  // 5) вычищаем шаблонные {{ ... }} из текстовых узлов
  stripMustache(doc, doc.body);

  const head = doc.head ? doc.head.innerHTML : "";
  return "<!DOCTYPE html><html><head>" + head + "</head>" + doc.body.outerHTML + "</html>";
}

function unwrap(el) {
  const p = el.parentNode;
  if (!p) return;
  while (el.firstChild) p.insertBefore(el.firstChild, el);
  p.removeChild(el);
}

function stripMustache(doc, root) {
  const w = doc.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let n;
  while ((n = w.nextNode())) nodes.push(n);
  nodes.forEach((t) => {
    if (t.nodeValue.indexOf("{{") >= 0) t.nodeValue = t.nodeValue.replace(/\{\{[^}]*\}\}/g, "").trim();
  });
}

function convertViaIframe(html, width) {
  return new Promise((resolve, reject) => {
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:absolute;left:-99999px;top:0;border:0;width:" + width + "px;height:10px;";
    const cleanup = () => { try { document.body.removeChild(iframe); } catch (e) {} };
    iframe.addEventListener("load", async () => {
      try {
        const doc = iframe.contentDocument;
        if (!doc) throw new Error("no contentDocument");
        await raf(); await raf();
        iframe.style.height = Math.max(doc.body.scrollHeight, 1) + "px";
        await raf();
        const tree = await buildRoot(doc, doc.body, width);
        cleanup();
        resolve(tree);
      } catch (e) { cleanup(); reject(e); }
    });
    iframe.addEventListener("error", () => { cleanup(); reject(new Error("iframe error")); });
    document.body.appendChild(iframe);
    iframe.srcdoc = html;
  });
}

async function convertInDocument(html, width) {
  const parsed = new DOMParser().parseFromString(html, "text/html");
  const b = parsed.body;
  const box = document.createElement("div");
  let css = "position:absolute;left:-99999px;top:0;width:" + width + "px;";
  const bg = b && (b.style.background || b.style.backgroundColor);
  css += "background:" + (bg || "#ffffff") + ";";
  if (b && b.style.padding) css += "padding:" + b.style.padding + ";";
  box.style.cssText = css;
  box.innerHTML = b ? b.innerHTML : html;
  // переносим <style> из документа, чтобы правила вёрстки применились при замере
  parsed.querySelectorAll("style").forEach((s) => box.insertBefore(s.cloneNode(true), box.firstChild));
  document.body.appendChild(box);
  try {
    await raf(); await raf();
    return await buildRoot(document, box, width);
  } finally {
    document.body.removeChild(box);
  }
}

async function buildRoot(doc, rootEl, width) {
  const rootRect = rootEl.getBoundingClientRect();
  const tree = await buildEl(rootEl, rootRect, doc, 0);
  tree.x = 0; tree.y = 0;
  tree.w = Math.max(rootEl.scrollWidth, width);
  tree.h = Math.max(rootEl.scrollHeight, rootRect.height, 1);
  tree.name = "Claude Design";
  return tree;
}

function raf() { return new Promise((r) => requestAnimationFrame(r)); }

async function buildEl(el, parentRect, doc, depth) {
  if (depth > 60) return null;
  const win = doc.defaultView;
  const cs = win.getComputedStyle(el);
  if (cs.display === "none" || cs.visibility === "hidden") return null;

  const rect = el.getBoundingClientRect();
  const hasKids = [...el.children].some((c) => !SKIP.has(c.tagName));
  if ((rect.width < 0.5 || rect.height < 0.5) && !hasKids) return null;

  const node = {
    type: "FRAME",
    name: el.tagName.toLowerCase() + (el.id ? "#" + el.id : ""),
    x: rect.left - parentRect.left,
    y: rect.top - parentRect.top,
    w: rect.width,
    h: rect.height,
    bg: parseColor(cs.backgroundColor),
    border: parseBorder(cs),
    radius: parseRadius(cs),
    opacity: clamp01(parseFloat(cs.opacity)),
    children: [],
  };

  if (el.tagName && el.tagName.toLowerCase() === "svg") {
    node.type = "SVG";
    node.svg = serializeSvg(el);
    return node; // внутрь SVG не рекурсимся — он импортируется целиком
  }
  if (el.tagName === "IMG") {
    node.type = "IMAGE";
    node.bytes = await fetchBytes(el.currentSrc || el.src);
    return node;
  }
  const bgUrl = parseUrl(cs.backgroundImage);
  if (bgUrl) node.bytes = await fetchBytes(bgUrl);
  // градиент → сплошной цвет (Figma не поддерживает repeating-градиенты)
  if (!node.bg && !node.bytes) {
    const gc = parseGradientFirstColor(cs.backgroundImage);
    if (gc) node.bg = gc;
  }

  const kids = [...el.children].filter((c) => !SKIP.has(c.tagName));
  if (kids.length === 0) {
    const text = (el.textContent || "").replace(/\s+/g, " ").trim();
    if (text) node.children.push(textChild(rect, cs, text));
  } else {
    for (const c of kids) {
      const cn = await buildEl(c, rect, doc, depth + 1);
      if (cn) node.children.push(cn);
    }
  }
  return node;
}

let _measCtx = null;
function measureTextWidth(text, cs) {
  try {
    if (!_measCtx) _measCtx = document.createElement("canvas").getContext("2d");
    const italic = (cs.fontStyle || "").indexOf("italic") >= 0 ? "italic " : "";
    _measCtx.font = italic + (parseInt(cs.fontWeight, 10) || 400) + " " + px(cs.fontSize) + "px " + cs.fontFamily;
    // учитываем межбуквенный интервал (часто отрицательный у заголовков)
    try { _measCtx.letterSpacing = cs.letterSpacing && cs.letterSpacing !== "normal" ? cs.letterSpacing : "0px"; } catch (e) {}
    return _measCtx.measureText(text).width;
  } catch (e) { return 0; }
}

function textChild(rect, cs, text) {
  const pl = px(cs.paddingLeft) + px(cs.borderLeftWidth);
  const pt = px(cs.paddingTop) + px(cs.borderTopWidth);
  const pr = px(cs.paddingRight) + px(cs.borderRightWidth);
  const pb = px(cs.paddingBottom) + px(cs.borderBottomWidth);
  const w = Math.max(1, rect.width - pl - pr);
  const h = Math.max(1, rect.height - pt - pb);

  // влезает ли текст в одну строку (по ширине бокса) и насколько бокс «тесный»
  const natW = measureTextWidth(text, cs);
  const fitsOneLine = natW > 0 && natW <= w + 2;
  const tight = natW > 0 && w <= natW + 8;

  // выравнивание: явный text-align, иначе из flex (justify/align)
  const flex = (cs.display || "").indexOf("flex") >= 0;
  let align = cs.textAlign;
  if (align !== "center" && align !== "right" && align !== "end" && align !== "justify") {
    if (flex && cs.justifyContent === "center") align = "center";
    else if (flex && (cs.justifyContent === "flex-end" || cs.justifyContent === "end")) align = "right";
    else align = "left";
  }
  const valign = flex && cs.alignItems === "center" ? "center" : "top";

  // режим авторазмера текста, чтобы подмена шрифта не ломала перенос
  let autoResize;
  if (fitsOneLine && tight) autoResize = "WIDTH_AND_HEIGHT"; // тесный бокс — растём по ширине, без переноса
  else if (fitsOneLine) autoResize = "NONE";                 // широкий бокс (кнопка) — держим бокс, центрируем
  else autoResize = "HEIGHT";                                // многострока — фикс. ширина, авто-высота

  return {
    type: "TEXT",
    x: pl,
    y: pt,
    w,
    h,
    text,
    autoResize,
    valign,
    font: {
      family: firstFamily(cs.fontFamily),
      style: weightToStyle(cs.fontWeight, cs.fontStyle),
      size: px(cs.fontSize),
      color: parseColor(cs.color) || { r: 0, g: 0, b: 0, a: 1 },
      align,
      lineHeight: cs.lineHeight === "normal" ? 0 : px(cs.lineHeight),
      letter: cs.letterSpacing === "normal" ? 0 : px(cs.letterSpacing),
    },
  };
}

// сериализация инлайнового <svg> для figma.createNodeFromSvg (с гарантией xmlns)
function serializeSvg(el) {
  let s = "";
  try { s = el.outerHTML || ""; } catch (e) {}
  if (!s) { try { s = new XMLSerializer().serializeToString(el); } catch (e) { s = ""; } }
  if (s && s.indexOf("xmlns") === -1) s = s.replace(/<svg/i, '<svg xmlns="http://www.w3.org/2000/svg"');
  return s;
}

/* ------------------------------- парсеры стилей ------------------------------- */
function px(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function clamp01(n) { return isNaN(n) ? 1 : Math.max(0, Math.min(1, n)); }

function parseColor(str) {
  if (!str) return null;
  const m = str.match(/rgba?\(([^)]+)\)/i);
  if (!m) return null;
  const p = m[1].split(",").map((s) => parseFloat(s.trim()));
  const a = p.length > 3 ? p[3] : 1;
  if (a === 0) return null;
  return { r: (p[0] || 0) / 255, g: (p[1] || 0) / 255, b: (p[2] || 0) / 255, a };
}

function parseBorder(cs) {
  const w = px(cs.borderTopWidth);
  if (w <= 0 || cs.borderTopStyle === "none") return null;
  const color = parseColor(cs.borderTopColor);
  if (!color) return null;
  return { w, color };
}

function parseRadius(cs) {
  return [
    px(cs.borderTopLeftRadius),
    px(cs.borderTopRightRadius),
    px(cs.borderBottomRightRadius),
    px(cs.borderBottomLeftRadius),
  ];
}

function parseUrl(bg) {
  if (!bg || bg === "none") return null;
  const m = bg.match(/url\((['"]?)(.*?)\1\)/i);
  return m && !m[2].startsWith("data:image/svg") ? m[2] : null;
}

// первый цвет градиента → сплошная заливка (Chrome отдаёт цвета как rgb()/rgba())
function parseGradientFirstColor(bgImage) {
  if (!bgImage || bgImage.indexOf("gradient") < 0) return null;
  const m = bgImage.match(/rgba?\([^)]+\)/i);
  return m ? parseColor(m[0]) : null;
}

function firstFamily(ff) {
  return (ff || "Inter").split(",")[0].replace(/["']/g, "").trim() || "Inter";
}

function weightToStyle(weight, fontStyle) {
  const w = parseInt(weight, 10) || 400;
  const map = { 100: "Thin", 200: "Extra Light", 300: "Light", 400: "Regular",
                500: "Medium", 600: "Semi Bold", 700: "Bold", 800: "Extra Bold", 900: "Black" };
  let style = map[Math.round(w / 100) * 100] || "Regular";
  if (fontStyle && fontStyle.indexOf("italic") >= 0) style += " Italic";
  return style;
}

async function fetchBytes(url) {
  if (!url || url.startsWith("data:image/svg")) return null;
  try {
    const res = await fetch(url, { mode: "cors" });
    if (!res.ok) return null;
    const buf = await res.arrayBuffer();
    return Array.from(new Uint8Array(buf));
  } catch (e) {
    return null; // CORS/сеть — заменим серым плейсхолдером на стороне Figma
  }
}
</script>
</body>
</html>
